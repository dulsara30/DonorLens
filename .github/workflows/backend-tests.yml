name: Backend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "donorlens-backend/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "donorlens-backend/**"

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      MONGO_URI: mongodb://localhost:27017/donorlens_test
      PORT: 5000
      NODE_ENV: test
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 14d
      CLIENT_URL: http://localhost:5173
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: donorlens-backend/package-lock.json

      - name: Install dependencies
        working-directory: donorlens-backend
        run: npm ci

      - name: Install Playwright
        working-directory: donorlens-backend
        run: npx playwright install --with-deps

      - name: Wait for MongoDB
        run: |
          for i in {1..30}; do
            if mongosh --eval "db.runCommand({ ping: 1 })" --quiet 2>/dev/null; then
              echo "MongoDB is ready"
              break
            fi
            echo "Waiting for MongoDB... ($i/30)"
            sleep 1
          done

      - name: Start backend server
        working-directory: donorlens-backend
        run: node server.js &

      - name: Wait for server to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:5000 > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
          done

      - name: Run Playwright tests
        working-directory: donorlens-backend
        run: npx playwright test

      - name: Upload test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: donorlens-backend/playwright-report/
          retention-days: 30
